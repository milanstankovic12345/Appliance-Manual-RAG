# Reference nginx config for the Appliance Manual RAG.
# Used by deploy_server.sh — placed at /etc/nginx/sites-available/appliance-rag.
# Single port 80:
#   /         → Next.js on :3000
#   /api/*    → FastAPI on :8000
# Adjust BACKEND_PORT and FRONTEND_PORT to match your environment.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Allow large PDF uploads
    client_max_body_size 100M;

    # Compressed assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Logs
    access_log /var/log/nginx/appliance-rag.access.log;
    error_log  /var/log/nginx/appliance-rag.error.log;

    # ── API → FastAPI ──────────────────────────────────────────────────────
    location /api/ {
        # Strip the /api prefix so /api/query → /query on the backend
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Generous timeouts for long LLM responses
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
    }

    # ── Everything else → Next.js ──────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
